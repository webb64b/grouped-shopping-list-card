# Shopping List AI Sorter Package
# Provides the full-list sort button, auto-sort toggle, and daily auto-sort.
#
# Requirements:
#   - An AI integration that exposes the ai_task.generate_data service
#     (e.g. OpenAI Conversation, Anthropic, Google Generative AI)
#   - The todo.shopping_list entity (default HA shopping list)
#
# Installation:
#   1. Copy this file to your config/packages/ directory
#   2. Add "packages: !include_dir_named packages" to configuration.yaml
#      (if not already present)
#   3. Restart Home Assistant

automation:
  - id: sort_shopping_list_button
    alias: Sort Shopping List (Button)
    description: >
      Categorize uncategorized shopping list items in place when the button is
      pressed. NEVER clears the list — items the AI can't place stay
      uncategorized, so nothing is ever lost.
    mode: single
    max_exceeded: silent

    trigger:
      - platform: state
        entity_id: input_button.sort_shopping_list_button

    action:
      # Get current (incomplete) shopping list items
      - service: todo.get_items
        target:
          entity_id: todo.shopping_list
        response_variable: current_items
        data:
          status: needs_action

      # Only the uncategorized ones (summary not already prefixed with [CATEGORY])
      - variables:
          uncategorized: >
            {{ current_items['todo.shopping_list']['items']
               | map(attribute='summary')
               | reject('match', '^\\[')
               | list }}

      # Nothing to do if everything is already categorized
      - condition: template
        value_template: "{{ uncategorized | length > 0 }}"

      # Ask the AI to categorize ONLY the uncategorized items, keeping names identical
      - action: ai_task.generate_data
        data:
          task_name: "sort_shopping_list"
          instructions: |
            Categorize each shopping item into exactly one of these categories:
            PRODUCE, MEAT, DAIRY, FROZEN, BAKERY, PANTRY, BEVERAGES, SNACKS, HEALTH, HOUSEHOLD, OTHER

            Return ONE line per input item, formatted exactly as:
            [CATEGORY] item name

            Keep each item name IDENTICAL to the input (same spelling, same words).
            Do not add, drop, merge, or rename items.

            Items:
            {{ uncategorized | join('\n') }}
        response_variable: sorted_list
        continue_on_error: true

      # Only proceed when the AI returned usable, non-empty output
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ sorted_list is defined
                     and sorted_list.data is defined
                     and (sorted_list.data | trim) != '' }}
            sequence:
              # Rename each matched item IN PLACE. We never clear the list, so an
              # item the AI omits or renames beyond recognition simply stays as-is.
              - variables:
                  lines: >
                    {{ sorted_list.data.split('\n')
                       | map('trim')
                       | select('match', '^\\[')
                       | list }}
              - repeat:
                  for_each: "{{ lines }}"
                  sequence:
                    - variables:
                        # Everything after the first "] " is the (unchanged) item name,
                        # which is what the item is currently called on the list.
                        oldname: "{{ (repeat.item.split('] ')[1:] | join('] ')) | trim }}"
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ oldname != '' }}"
                          sequence:
                            - service: todo.update_item
                              target:
                                entity_id: todo.shopping_list
                              data:
                                item: "{{ oldname }}"
                                rename: "{{ repeat.item | trim }}"
                              continue_on_error: true

  # Daily safety net: categorize any uncategorized items (e.g. added via voice/app)
  - id: sort_shopping_list_daily
    alias: Sort Shopping List (Daily)
    description: Categorize any uncategorized shopping list items at 9 AM
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.auto_sort_shopping_list
        state: 'on'
    action:
      # Fetch items and check for uncategorized ones before calling AI
      - service: todo.get_items
        target:
          entity_id: todo.shopping_list
        response_variable: current_items
        data:
          status: needs_action
      - condition: template
        value_template: >
          {{ current_items['todo.shopping_list']['items']
             | selectattr('summary', 'match', '^(?!\\[).*')
             | list | length > 0 }}
      - service: automation.trigger
        target:
          entity_id: automation.sort_shopping_list_button

# Input helpers
input_button:
  sort_shopping_list_button:
    name: Sort Shopping List
    icon: mdi:sort-variant

input_boolean:
  auto_sort_shopping_list:
    name: Auto-Categorize Shopping List
    icon: mdi:sort-clock-ascending

# Optional: Add to shopping list via voice/text
script:
  add_items_to_shopping_list:
    alias: Add Multiple Items to Shopping List
    fields:
      items:
        description: Comma-separated list of items to add
        example: "milk, bread, apples, chicken"
    sequence:
      - variables:
          item_list: "{{ items.split(',') }}"
      - repeat:
          for_each: "{{ item_list }}"
          sequence:
            - service: shopping_list.add_item
              data:
                name: "{{ repeat.item | trim }}"

  # Simple alphabetical sort (no AI)
  sort_shopping_list_alphabetical:
    alias: Sort Shopping List Alphabetically
    sequence:
      - service: shopping_list.sort
        data:
          reverse: false
